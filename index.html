<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heavenly Grace Church | Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated background effect */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveBackground 20s linear infinite;
            opacity: 0.3;
        }

        @keyframes moveBackground {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(50px, 50px);
            }
        }

        .splash-container {
            text-align: center;
            z-index: 1;
            padding: 2rem;
            animation: fadeInUp 1s ease;
        }

        .church-icon {
            font-size: 5rem;
            color: white;
            margin-bottom: 1rem;
            animation: bounce 2s ease infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        h1 {
            font-size: 4rem;
            color: white;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .tagline {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.9);
            margin-bottom: 3rem;
            letter-spacing: 2px;
        }

        .join-btn {
            display: inline-block;
            padding: 1.2rem 3rem;
            font-size: 1.2rem;
            font-weight: 600;
            color: #764ba2;
            background: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .join-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            background: #f0f0f0;
        }

        .join-btn i {
            margin-left: 10px;
            transition: transform 0.3s;
        }

        .join-btn:hover i {
            transform: translateX(5px);
        }

        .verse {
            position: absolute;
            bottom: 30px;
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
            text-align: center;
            width: 100%;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            .tagline {
                font-size: 1rem;
            }
            .join-btn {
                padding: 1rem 2rem;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <div class="church-icon">
            <i class="fas fa-church"></i>
        </div>
        <h1>Imperishable Crown Bible Baptist Church</h1>
        <div class="tagline">A Place of Worship, Love & Community</div>
        <a href="home.html" class="join-btn">
            Join Us Sunday <i class="fas fa-arrow-right"></i>
        </a>
    </div>
    <div class="verse">
        <i class="fas fa-bible"></i> "Come, let us worship and bow down" - Psalm 95:6
    </div>
</body>
</html>
